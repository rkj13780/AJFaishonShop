<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A J Fashion Shop | Indian Garments Retail</title>
  <meta name="description" content="A J Fashion Shop – Shirts, T‑shirts, Jeans, Trousers, Lowers & more. Good fits, fair prices, and friendly service." />
  <meta name="theme-color" content="#b80f13" />

  <!-- Web fonts (English + Hindi) -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Noto+Sans+Devanagari:wght@700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      /* Palette echoing Indian garment storefront vibes */
      --aj-red:#b80f13;          /* deep vermilion */
      --aj-red-dark:#8f0b0e;
      --aj-gold:#ffd24d;         /* warm yellow-gold */
      --aj-gold-deep:#f5b700;
      --aj-green:#0d5a3d;        /* deep green band */
      --ink-900:#1a1a1a;
      --ink-700:#444;
      --ink-500:#6a6a6a;
      --paper:#ffffff;
      --paper-2:#fff8e9;
      --shadow: 0 14px 30px rgba(0,0,0,.15);
      --radius: 16px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--paper);color:var(--ink-900);font-family:Poppins,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial,sans-serif}
    img{max-width:100%;display:block}
    a{color:inherit;text-decoration:none}

    .topbar{
      background:linear-gradient(90deg,var(--aj-green),#0b4a33);
      color:#eafff3;text-align:center;padding:8px 12px;font-size:.95rem
    }

    header{
      position:sticky;top:0;z-index:50;
      background:#fff;border-bottom:4px solid var(--aj-red);
      box-shadow:0 4px 16px rgba(0,0,0,.05)
    }
    .wrap{max-width:1200px;margin:0 auto;padding:0 18px}
    .brand{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 0}
    .logo{display:flex;align-items:center;gap:12px}
    .badge{
      width:46px;height:46px;border-radius:12px;
      display:grid;place-items:center;color:#fff;font-weight:800;
      background:linear-gradient(135deg,var(--aj-red),var(--aj-red-dark));
      box-shadow:0 8px 18px rgba(184,15,19,.35)
    }
    .title span{display:block;line-height:1.1}
    .title .en{font-weight:800;font-size:1.35rem;letter-spacing:.2px}
    .title .hi{
      font-family:"Noto Sans Devanagari", Poppins, sans-serif;font-weight:800;
      color:var(--aj-green);letter-spacing:.5px;text-shadow:0 1px 0 #fff
    }
    nav{display:flex;gap:16px;flex-wrap:wrap;font-weight:600}
    nav a{padding:8px 10px;border-radius:10px}
    nav a:hover{background:#fff6e3;box-shadow:var(--shadow)}

    /* Hero with optional shop photo */
    .hero{
      position:relative;isolation:isolate;color:#fff;
      background:
        linear-gradient(180deg,rgba(184,15,19,.78),rgba(13,90,61,.88)),
        url('shop-front.jpg') center/cover no-repeat;
      min-height:58vh;display:flex;align-items:center
    }
    .hero .panel{max-width:1100px;margin:42px auto;padding:26px;display:grid;gap:22px;grid-template-columns:1.15fr .85fr}
    .card{
      background:rgba(255,255,255,.09);
      border:1px solid rgba(255,255,255,.35);
      border-radius:22px;padding:22px;backdrop-filter:blur(6px);
      box-shadow:0 14px 34px rgba(0,0,0,.25)
    }
    h1{margin:.1rem 0 8px;font-weight:800;font-size:clamp(1.8rem,3.8vw,2.6rem)}
    .sub{opacity:.96;font-size:1.05rem;line-height:1.55}
    .cta-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 16px;border-radius:12px;font-weight:700;border:2px solid transparent;cursor:pointer}
    .btn-primary{background:linear-gradient(135deg,var(--aj-gold),var(--aj-gold-deep));color:#502f00}
    .btn-outline{background:transparent;border-color:#fff;color:#fff}

    .section{padding:58px 0}
    .section.alt{background:var(--paper-2)}
    .section h2{margin:0 0 10px;font-size:clamp(1.4rem,2.5vw,2rem)}
    .section .lead{color:var(--ink-700);margin:0 0 24px}

    .grid{display:grid;gap:18px}
    .grid-3col{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
    .tile{
      background:#fff;border:1px solid #eee;border-radius:16px;padding:18px;
      display:flex;align-items:center;gap:14px;box-shadow:0 8px 20px rgba(0,0,0,.07);
      transition:.2s transform ease, .2s box-shadow ease
    }
    .tile:hover{transform:translateY(-4px);box-shadow:0 16px 30px rgba(0,0,0,.12)}
    .icon{
      width:56px;height:56px;border-radius:12px;display:grid;place-items:center;font-size:28px;color:#fff;
      background:linear-gradient(135deg,var(--aj-red),var(--aj-red-dark))
    }
    .tile h3{margin:0 0 4px;font-size:1.05rem}
    .tile p{margin:0;color:var(--ink-700);font-size:.95rem}

    .offer{margin-top:14px;border-left:6px solid var(--aj-red);background:linear-gradient(90deg,#fff,#fff7de);padding:14px 16px;border-radius:12px}

    .store{display:grid;gap:22px;grid-template-columns:1.1fr .9fr}
    .card.solid{background:#fff;color:var(--ink-900);border:1px solid #eee}
    .list{display:grid;gap:10px}
    .li{display:flex;gap:10px;align-items:flex-start}
    .li strong{min-width:120px}

    footer{background:linear-gradient(180deg,var(--aj-red),var(--aj-red-dark));color:#fff;padding:26px 0;margin-top:36px}
    footer small{opacity:.9}

    /* Mobile tweaks */
    @media (max-width: 900px){
      .hero .panel{grid-template-columns:1fr}
      .store{grid-template-columns:1fr}
      nav{display:none}
    }

    /* Vertical side banners (desktop) to echo Indian storefront columns */
    @media (min-width: 1100px){
      .side{
        position:fixed;top:92px;bottom:22px;width:80px;display:grid;place-items:center;
        background:linear-gradient(180deg,var(--aj-red),var(--aj-red-dark));color:var(--aj-gold);
        border-radius:12px;box-shadow:0 16px 36px rgba(0,0,0,.22);
        text-align:center;padding:12px;writing-mode:vertical-rl;text-orientation:upright;
        font-weight:800;letter-spacing:.8px
      }
      .left{left:16px}
      .right{right:16px}
    }
  </style>
</head>
<body>

  <div class="topbar">New Arrivals • Shirts • T‑Shirts • Jeans • Trousers • Lowers • Seasonal Offers</div>

  <header>
    <div class="wrap brand">
      <div class="logo">
        <div class="badge">AJ</div>
        <div class="title">
          <span class="en">A J Fashion Shop</span>
          <span class="hi">ए. जे. फैशन शॉप</span>
        </div>
      </div>

      <nav aria-label="Primary">
        <a href="#categories">Categories</a>
        <a href="#why">Why Us</a>
        <a href="#store">Visit Us</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Optional vertical storefront-style banners -->
